[config]
# Model: DeepSeek V4 Pro through OmniRoute (Fireworks upstream).
# Swapped from `openai/cx/gpt-5.3-codex` (GPT-5.3 Codex) on 2026-05-04 per PO
# authorisation chat 2026-05-04 («в соседнем репо девелопер-ассистант мы поняли,
# что кодекс плоховато работает с пр-агентом, нужны доп настройки. поэтому
# проще поставить дипсик 4 про и эффективнее»). Replicates the validated
# config from sibling repo `OpenClown-bot/developer-assistant` (.pr_agent.toml
# + .github/workflows/pr_agent.yml + session-log/2026-05-04-session-1.md
# §LLM stack confirming DeepSeek V4 Pro is the working baseline). Rationale
# captured in `docs/knowledge/llm-model-evaluation-2026-05.md` §4 + §4.1 +
# BACKLOG-009 §pr-agent-ci-tail-latency-investigation-CRITICAL.
#
# Root-cause analysis of the prior Codex silent failure (PRs #93/#94/#95/#96/#100):
# the env-var notation `OPENAI.API_BASE` (DOT) in .github/workflows/pr_agent.yml
# was silently ignored by GitHub Actions (dots are invalid in shell env var
# names), so LiteLLM never received the OmniRoute base URL and fell back to
# default routing, which mis-parsed `cx/gpt-5.3-codex` and emitted
# `litellm.BadRequestError: No credentials for provider: openrouter`. The
# notation is fixed in the same PR (`OPENAI__API_BASE` with double underscores
# per https://qodo-merge-docs.qodo.ai/usage-guide/changing_a_model/), and the
# model swap to DeepSeek V4 Pro adopts the sibling repo's empirically
# validated config to avoid layering Codex idiosyncrasies on top of the
# notation fix.
#
# `openai/` prefix is required by LiteLLM (PR-Agent's underlying client) to route
# this call through the OpenAI-compatible custom endpoint defined by
# `OPENAI__API_BASE` (set in .github/workflows/pr_agent.yml). Without `openai/`,
# LiteLLM tries to parse the first path segment as a provider (e.g. `fireworks`
# fails as "LLM Provider NOT provided" because the canonical Fireworks provider
# in LiteLLM is `fireworks_ai`, and even that bypasses our OmniRoute proxy).
# Ref: https://litellm.vercel.app/docs/providers/openai_compatible
#
# Full LiteLLM-prefixed model identifier (must stay in sync with the
# `config.model` line in .github/workflows/pr_agent.yml):
model = "openai/fireworks/accounts/fireworks/models/deepseek-v4-pro"
# 64K effective context. In practice we rarely need more than ~30-40K for
# review/describe even on large diffs (TKT-014 cumulative review-context
# stayed under 100K), and this keeps PR-Agent calls smaller and more
# predictable while still leaving room for ticket context. Sibling repo
# `developer-assistant` uses the same value; matches the empirical baseline.
custom_model_max_tokens = 65536
# 3 minutes — enough for normal PR-Agent calls while still failing fast on
# upstream routing stalls. Sibling-repo calibrated value.
ai_timeout = 180
# More patch context lets the reviewer reason about callers/callees per chunk.
patch_extra_lines_before = 8
patch_extra_lines_after = 3
allow_dynamic_context = true
# Skip noise: orchestrator clerical / session-log / auto-cold / chore / docs-only
# PRs are low-signal. Mirrors the workflow-level skip filter for consistency
# (workflow `if:` is the load-bearing skip; this is belt-and-suspenders).
ignore_pr_title = ["^\\[Auto\\]", "^Auto", "^session-log:", "^clerical:", "^chore/", "^docs-only:"]
# English review output to match the repo convention (Russian for PO chat only).
response_language = "en-US"

[litellm]
# Drop provider-unsupported OpenAI params instead of failing the PR-Agent run.
# Sibling-repo standard.
drop_params = true

[pr_reviewer]
# Mandate the most useful checks for our threat model + scope discipline.
# Security and tests are LOAD-BEARING and stay on (they catch the highest-impact
# misses our human/LLM process must not let through).
#
# can_be_split, estimate_effort, and ticket_analysis are advisory analyses that
# each cost an additional LLM call but rarely produce actionable output for
# this repo's PR style (small ticket-scoped diffs, ticket already linked,
# effort already pre-estimated by the Architect at ticket creation time).
# Disabled to cut typical PR-Agent run latency by ~30-50% per the sibling-repo
# empirical finding. If a future PR is big enough that any of these would
# actually help, the PO can manually trigger via /review with the appropriate
# flag.
require_security_review = true
require_tests_review = true
require_estimate_effort_to_review = false
require_can_be_split_review = false
require_ticket_analysis_review = false
# Up from default 3 — we want PR-Agent to surface more as the supplementary reviewer.
num_max_findings = 6
publish_output_no_suggestions = true
final_update_message = true
enable_review_labels_security = true
enable_review_labels_effort = true
extra_instructions = """\
This repo is a docs-as-code KBJU coach (Telegram bot) managed by a multi-LLM \
pipeline (Architect, Code Executor, Reviewer Kimi K2.6) — see AGENTS.md.

You (DeepSeek V4 Pro through OmniRoute) are the supplementary second reviewer \
alongside Kimi K2.6. Focus on issues Kimi may underweight:

1. AC traceability: every Ticket PR (title 'TKT-NNN: ...') lists Acceptance \
   Criteria with file:line 'Proof' links in the description. Verify each cited \
   file:line actually exists in the diff and the proof matches the AC text. \
   Flag missing or weak proofs.
2. Scope discipline: PR diff must touch only files in the Ticket's §5 Outputs \
   section + the ticket's own frontmatter (HARD SCOPE carve-out for status / \
   §10 log). Architectural files (docs/architecture/, docs/architecture/adr/, \
   docs/reviews/, docs/prompts/, docs/meta/) are off-limits to Executor PRs \
   unless explicitly listed in the Ticket. Flag scope creep.
3. Frontmatter integrity: every artifact under docs/architecture/, \
   docs/tickets/, docs/reviews/ has a YAML frontmatter `id` field. The \
   validator (scripts/validate_docs.py) checks references; flag any new \
   artifact without proper frontmatter.
4. Security focus: the bot processes Russian user text and feeds it to LLMs. \
   Watch for prompt-injection bypasses (Russian/Cyrillic patterns), \
   unsanitized log fields, secrets in code, JSON-schema validation gaps.
5. Concurrency safety: the bot runs as a single Telegram process; rate-limiters \
   and shared in-memory state must be atomic across awaits. Flag read-modify- \
   write sequences that span await boundaries (RV-CODE-006 F-M3 caught one).
6. Test quality: tests use Vitest. Flag tests that don't use \
   `vi.useFakeTimers()` for time-based assertions, that mock instead of using \
   real objects unnecessarily, or that miss failure-path coverage.

Do NOT flag:
- Markdown / docs formatting nits — Reviewer Kimi K2.6's domain.
- Style preferences — no eslint config in repo; both `npm run lint` and \
  `npm run typecheck` alias to `tsc --noEmit` (repo quirk).
- Speculative refactor suggestions on first-pass code; Executor will iterate \
  per Reviewer's medium findings.
"""

[pr_description]
# Honor the repo's PR template; do NOT overwrite human-authored content.
publish_labels = true
add_original_user_description = true
generate_ai_title = false
use_bullet_points = true
enable_pr_type = true
# Diagram generation is an additional slow LLM call that produces mermaid diagrams.
# On PRs that are mostly docs/tickets/specs (most of our governance work) the
# resulting diagrams are uninformative. Disabled to cut another ~1-2 min per run.
# Enable per-PR via /describe --diagram if a specific PR would benefit. Sibling-
# repo preference.
enable_pr_diagram = false
enable_large_pr_handling = true
collapsible_file_list = "adaptive"
collapsible_file_list_threshold = 6
use_description_markers = true
extra_instructions = """\
PR descriptions in this repo follow .github/PULL_REQUEST_TEMPLATE.md (when \
present) or a Ticket-specific AC table. Do NOT overwrite existing description \
content; respect the human-authored sections. Add AI walkthrough only inside \
description markers when present, and keep it collapsed by default.
"""

[pr_code_suggestions]
# Inline suggestions become committable directly from the GitHub UI.
commitable_code_suggestions = true
focus_only_on_problems = true
# Reduced from 4→2 (per-chunk) and 4→2 (calls) on 2026-05-01 after observing
# that with `focus_only_on_problems = true`, the suggestions step almost
# always returns "No code suggestions found for the PR" while consuming
# ~3–4 minutes of runtime. The persistent review (auto_review) is the load-
# bearing PR-Agent output for the cross-reviewer audit; suggestions are
# supplementary. Keeping suggestions enabled but cheaper.
num_code_suggestions_per_chunk = 2
max_number_of_calls = 2
parallel_calls = true
new_score_mechanism = true
new_score_mechanism_th_high = 9
new_score_mechanism_th_medium = 7
suggestions_score_threshold = 7
extra_instructions = """\
Suggest improvements that are:
- Security-focused: input validation, output sanitization, prompt-injection \
  defenses (Russian/Cyrillic patterns), secret-leak prevention.
- Concurrency-safe: atomic reads/writes around shared state, mutex/queue \
  serialization for read-modify-write across awaits.
- TypeScript-idiomatic: strict types, no `any`, no `as any`, no `// @ts-ignore`.
- Test-aware: suggest test additions for new code paths, prefer real objects \
  over mocks, use `vi.useFakeTimers()` for time-based assertions.

Do NOT suggest:
- Cosmetic refactors (renaming, splitting functions for size only).
- Library swaps — we're locked to current deps for v0.1.
- Documentation comments — repo convention is terse code, no narrative \
  comments unless explaining non-obvious invariants.
"""

[pr_questions]
use_conversation_history = true

[pr_help]
num_retrieved_snippets = 8

[pr_help_docs]
docs_path = "docs"
