name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review]
  issue_comment:

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          OPENAI.API_BASE: "https://omniroute.infinitycore.space:8443/v1"
          OPENAI.API_TYPE: "openai"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          config.model: "fireworks/accounts/fireworks/models/qwen3p6-plus"
          config.custom_model_max_tokens: "131072"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review"]'