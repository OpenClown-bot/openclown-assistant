name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
  workflow_dispatch:

# Cancel stale runs when a new push lands on the same PR. PR-Agent's tail
# latency through OmniRoute can be 15-25 minutes; without this, multiple
# IN_PROGRESS runs pile up against successive HEADs and the cross-reviewer
# audit Hard rule (TO must wait for PR-Agent settle on final HEAD) becomes
# impossible to satisfy in reasonable time.
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    # Skip PR-Agent entirely for docs-only / clerical / session-log PRs. They
    # are by-construction low-risk (no code paths, no behavioural changes) and
    # PR-Agent's primary value (security / correctness / tests / scope drift)
    # does not apply. validate-docs + Reviewer LLM (Kimi) cover discipline for
    # these PR classes. This skip avoids burning ~12-18 min of OmniRoute time
    # on the configured PR-Agent model reviewing Markdown that nobody needs reviewed.
    #
    # The skip applies to pull_request events only. Manual triggers
    # (issue_comment with /review, workflow_dispatch, pull_request_review_comment)
    # always run so the founder can force a review on a clerical PR if needed.
    if: >-
      (github.event.sender.type != 'Bot' || github.event_name == 'workflow_dispatch')
      && (
        github.event_name != 'pull_request'
        || (
          !startsWith(github.event.pull_request.title, 'clerical:')
          && !startsWith(github.event.pull_request.title, 'session-log:')
          && !startsWith(github.event.pull_request.title, 'docs-only:')
          && !startsWith(github.event.pull_request.title, '[Auto]')
          && !startsWith(github.event.pull_request.title, 'Auto')
          && !startsWith(github.event.pull_request.title, 'chore/')
        )
      )
    runs-on: ubuntu-latest
    # Hard cap so a runaway run cannot block the pipeline indefinitely. If this
    # cap fires regularly, that is a signal to investigate OmniRoute / Fireworks
    # health rather than silently sit and wait. 18-min calibrated against
    # observed workloads in sibling repo `developer-assistant` (typical 3-9 min,
    # large docs PRs ~12-15 min, openclown TKT-010 iter-3 outlier 22 min). 18
    # covers the long tail without permitting truly runaway runs.
    timeout-minutes: 18
    permissions:
      issues: write
      pull-requests: write
    name: Run PR Agent on every pull request
    steps:
      - name: PR Agent action step
        id: pragent
        # Pin to a specific SHA (sibling-repo `developer-assistant` battle-tested
        # commit) instead of `@main` to avoid silent breakage when upstream
        # PR-Agent ships a behavioural change. Bump deliberately when needed.
        uses: the-pr-agent/pr-agent@0e37fc84fcc8207561e64eef8f7f634fb57e8447
        env:
          # OmniRoute API key. Single-underscore `OPENAI_KEY` is the canonical
          # OpenAI SDK env var that PR-Agent reads directly (not via nested
          # config-via-env). Keeps existing GitHub Actions secret name.
          OPENAI_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          # CRITICAL: PR-Agent / LiteLLM uses DOUBLE-UNDERSCORE notation
          # (`OPENAI__API_BASE`, NOT `OPENAI.API_BASE`) for nested-config-via-env
          # mapping. Dots are not valid characters in shell env var names —
          # GitHub Actions silently ignores `OPENAI.API_BASE` so LiteLLM never
          # receives the base URL and falls back to default routing, which
          # interprets `cx/gpt-5.3-codex` as `<provider>/<model>` and fails with
          # "No credentials for provider: openrouter". This was the root cause
          # of BACKLOG-009 §pr-agent-ci-tail-latency-investigation-CRITICAL
          # silent failures on PRs #93/#94/#95/#96/#100. Reference:
          # https://qodo-merge-docs.qodo.ai/usage-guide/changing_a_model/
          # ("make sure to use double underscores `__`")
          OPENAI__API_BASE: "https://omniroute.infinitycore.space:8443/v1"
          OPENAI__API_TYPE: "openai"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Model: DeepSeek V4 Pro through OmniRoute (Fireworks upstream).
          # Swapped from `openai/cx/gpt-5.3-codex` (GPT-5.3 Codex) on 2026-05-04
          # per PO authorisation — Codex was empirically observed to "плоховато
          # работать с пр-агентом" in sibling repo `developer-assistant`, where
          # DeepSeek V4 Pro is the validated PR-Agent model. Replicating the
          # working sibling config (model + env-var notation + pinned SHA + tuned
          # auto_improve flag) eliminates two compounding bugs (env-var notation
          # + Codex idiosyncrasies) in one swap. Rationale captured in
          # docs/knowledge/llm-model-evaluation-2026-05.md §4 + BACKLOG-009.
          # The `openai/` prefix routes the call through OPENAI__API_BASE per
          # LiteLLM's openai-compatible provider convention. Keep in sync with
          # the `model = ...` line in .pr_agent.toml.
          config.model: "openai/fireworks/accounts/fireworks/models/deepseek-v4-pro"
          # 64K effective context. In practice we rarely need more than ~30-40K
          # for review/describe even on large diffs (TKT-014 cumulative review-
          # context stayed under 100K), and this keeps PR-Agent calls smaller
          # and more predictable while still leaving room for ticket context.
          config.custom_model_max_tokens: "65536"
          # Drop provider-unsupported OpenAI params instead of failing the run.
          litellm.drop_params: "true"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          # `/improve` is intentionally manual: on small PRs it dominated runtime
          # while often publishing no suggestions after PR-Agent self-scoring
          # (sibling-repo empirical finding). Trigger via /improve on demand if
          # a specific PR would benefit.
          github_action_config.auto_improve: "false"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'

      - name: Compute PR-Agent CI telemetry
        if: always()
        continue-on-error: true
        run: |
          npx tsx scripts/pr-agent-telemetry.ts > pr-agent-stats.json 2>telemetry-stderr.txt || true
          echo "::group::PR-Agent CI Telemetry Output"
          cat pr-agent-stats.json || echo "(no telemetry output)"
          echo "::endgroup::"
          if [ -s telemetry-stderr.txt ]; then
            echo "::group::PR-Agent CI Telemetry Diagnostics"
            cat telemetry-stderr.txt
            echo "::endgroup::"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number || 0 }}
          PR_AGENT_MODEL: "deepseek-v4-pro"
