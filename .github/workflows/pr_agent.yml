name: PR Agent

on:
  pull_request:
    types: [opened, reopened, ready_for_review, synchronize]
  pull_request_review_comment:
    types: [created]
  issue_comment:
  workflow_dispatch:

# When a new push lands on a PR, cancel any still-running PR-Agent run on the
# previous HEAD. This avoids stale runs sitting in IN_PROGRESS for 20+ min
# after the PR has already moved on, and frees the runner pool.
concurrency:
  group: pr-agent-${{ github.event.pull_request.number || github.event.issue.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    if: ${{ github.event.sender.type != 'Bot' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    # Hard cap on a single PR-Agent run. Normal runtime is 3–9 min; tail
    # latency can hit 20+ min on OmniRoute / Fireworks congestion. Capping at
    # 12 min prevents runaway runs from blocking the cycle indefinitely. If
    # a run hits this timeout, that's a signal to Devin Orchestrator to
    # investigate provider health rather than wait silently.
    timeout-minutes: 12
    permissions:
      issues: write
      pull-requests: write
      contents: write
    name: Run PR Agent on every pull request
    steps:
      - name: PR Agent action step
        id: pragent
        uses: the-pr-agent/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.OMNIROUTE_API_KEY }}
          OPENAI.API_BASE: "https://omniroute.infinitycore.space:8443/v1"
          OPENAI.API_TYPE: "openai"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Swapped from "openai/accounts/fireworks/models/qwen3p6-plus" to
          # GPT-5.3 Codex on 2026-05-02 per PO Q5 authorisation (research-PR
          # #93 round-trip; rationale in docs/knowledge/llm-model-evaluation-2026-05.md
          # §4 + §4.1 + §6). OmniRoute upstream identifier verified by PO
          # from OpenAI Codex provider page (cx/gpt-5.3-codex BUILT-IN);
          # full LiteLLM-prefixed identifier below. Keep in sync with the
          # `model = ...` line in .pr_agent.toml.
          config.model: "openai/cx/gpt-5.3-codex"
          config.custom_model_max_tokens: "400000"
          github_action_config.auto_review: "true"
          github_action_config.auto_describe: "true"
          github_action_config.auto_improve: "true"
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "synchronize"]'
